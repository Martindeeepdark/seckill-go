server:
  grpc:
    addr: ""

data:
  redis:
    addr: redis:6379
    password: ""
    db: 0
  nats:
    addr: nats://nats:4222

discovery:
  mode: etcd
  etcd:
    endpoints:
      - etcd:2379
  namespace: seckill
  static_fallback: true
  ttl: 15s
  refresh_interval: 5s
  services:
    activity-service:
      - activity-service:9001
    stock-service:
      - stock-service:9002
    risk-service:
      - risk-service:9003
    order-service:
      - order-service:9004
    support-service:
      - support-service:9005
  advertise:
    seckill-processor: ""

processor:
  consumer_group: seckill-processor
  payment_timeout_delay: 10m
  queue_type: nats
  queue_size: 1024
  nats:
    url: nats://nats:4222
    stream: SECKILL
    subject: seckill.order.part_in
    post_pay_subject: seckill.post_pay
    payment_timeout_subject: seckill.payment.timeout
  cache:
    detail:
      local_ttl: 2m
      shards: 16
      max_entries: 1024
    sku:
      local_ttl: 2m
      shards: 32
      max_entries: 4096

rpc:
  timeout: 3s
  circuit_breaker:
    enabled: false

log:
  level: info

trace:
  enabled: false
  endpoint: otel-collector:4317
  insecure: true
