services:
  seckill-gateway:
    http:
      addr: 0.0.0.0:8080

data:
  redis:
    addr: redis:6379
    password: ""
    db: 0
  nats:
    addr: nats://nats:4222

rpc:
  activity: discovery:///activity-service
  stock: discovery:///stock-service
  risk: discovery:///risk-service
  order: discovery:///order-service
  payment: discovery:///support-service
  timeout: 5s
  circuit_breaker:
    enabled: false
  initial_window_size: 262144
  initial_conn_window_size: 1048576
  max_recv_msg_size: 4194304
  keepalive_time: 30s
  keepalive_timeout: 10s

discovery:
  mode: etcd
  etcd:
    endpoints:
      - etcd:2379
  static_fallback: true
  ttl: 15s
  refresh_interval: 5s
  services:
    activity-service:
      - activity-service:9001
    stock-service:
      - stock-service:9002
    risk-service:
      - risk-service:9003
    order-service:
      - order-service:9004
    support-service:
      - support-service:9005
  advertise:
    activity-service: activity-service:9001
    stock-service: stock-service:9002
    risk-service: risk-service:9003
    order-service: order-service:9004
    support-service: support-service:9005

mq:
  type: nats
  nats:
    url: nats://nats:4222
    stream: SECKILL
    subject: seckill.order.part_in
    post_pay_subject: seckill.post_pay

gateway:
  machine_check:
    enabled: false
    mode: java
    secret: ""
    random_length: 16
    ttl: 30s
  rate_limit:
    enabled: true
    max_qps: 50000
    rules:
      - resource: POST /api/seckill/part-in
        count: 50000
        interval: 1s
      - resource: GET /api/activities
        count: 10000
        interval: 1s
      - resource: GET /api/seckill/activity/:activityNo
        count: 20000
        interval: 1s
    user_enabled: true
    user_rate: 10
    user_interval: 10s
    user_expire: 5m
  risk:
    enabled: false
  degrade:
    enabled: true
    failure_threshold: 10
    timeout: 30s
  cache:
    refresh_interval: 30s
    detail:
      local_ttl: 5m
      shards: 16
      max_entries: 256
    list:
      local_ttl: 5m
      shards: 4
      max_entries: 4

log:
  level: info

trace:
  enabled: false
  endpoint: otel-collector:4317
  insecure: true
